---
name: CI

"on":
  push:
    branches:
      - "*"
  pull_request:
  schedule:
    - cron: 0 0 * * 0

permissions: read-all

jobs:
  unit-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16@sha256:adac386a3163424d8397b51b950187eaa661013020a1b9e0d5437a9752040f80
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
          POSTGRES_DB: netbox
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7@sha256:d7fcf65186e011faaa401b5e6edf5147e9dd01353984c795e515f6fee7dfbe6e
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Checkout NetBox
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          repository: netbox-community/netbox
          ref: v4.5.5
          path: netbox
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: |
          uv export --frozen --only-group dev --no-emit-project --format requirements-txt | \
            uv pip install --system -r /dev/stdin
          uv pip install --system -r netbox/requirements.txt
          uv pip install --system -e .

      - name: Set up NetBox configuration
        working-directory: netbox/netbox
        run: |
          cat > netbox/configuration.py << 'EOF'
          ALLOWED_HOSTS = ['*']
          DATABASE = {
              'NAME': 'netbox',
              'USER': 'netbox',
              'PASSWORD': 'netbox',
              'HOST': 'localhost',
              'PORT': '',
              'CONN_MAX_AGE': 300,
              'ENGINE': 'django.db.backends.postgresql'
          }
          REDIS = {
              'tasks': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 0},
              'caching': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 1}
          }
          SECRET_KEY = 'ci-test-secret-key-not-for-production-1234567890123456'
          API_TOKEN_PEPPERS = {0: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'}
          PLUGINS = ['netbox_kea']
          PLUGINS_CONFIG = {'netbox_kea': {'kea_timeout': 30}}
          EOF

      - name: Run unit tests with coverage
        working-directory: netbox/netbox
        run: |
          pytest ${{ github.workspace }}/netbox_kea/tests/ \
            --override-ini="DJANGO_SETTINGS_MODULE=netbox.settings" \
            --override-ini="pythonpath=${{ github.workspace }}/netbox/netbox" \
            --cov=netbox_kea \
            --cov-report=xml:${{ github.workspace }}/coverage.xml \
            --no-header -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4.6.0
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version-file: pyproject.toml

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check netbox_kea/

      - name: Ruff format check
        run: uv run ruff format --check netbox_kea/

      - name: REUSE compliance
        run: uv run reuse lint

  opengrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Install opengrep
        env:
          OPENGREP_VERSION: v1.23.0
          OPENGREP_SHA256: 1f06548af379ab6080698a609612890ffad2d92dc2172f1e97d38d48096d5ef8
        run: |
          curl -fsSL -o /usr/local/bin/opengrep \
            "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86"
          echo "${OPENGREP_SHA256}  /usr/local/bin/opengrep" | sha256sum -c -
          chmod +x /usr/local/bin/opengrep
          opengrep --version

      - name: Run opengrep rule-tests
        run: ./scripts/opengrep-test.sh

      - name: Run opengrep custom ruleset
        run: ./scripts/opengrep-scan.sh

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - netbox: v4.3
          - netbox: v4.4
          - netbox: v4.5

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - name: Setup Python 3.12
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version-file: pyproject.toml

      - name: Ensure playwright browsers are installed
        run: uv run playwright install --with-deps

      - name: Run uv build
        run: uv build

      - name: Run test_setup.sh
        run: ./tests/test_setup.sh
        env:
          NETBOX_CONTAINER_TAG: ${{ matrix.netbox }}

      - name: Run pytest
        run: |
          uv run pytest tests/ -p no:django --tracing=retain-on-failure -v

      - name: Upload Playwright traces
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-traces-${{ matrix.netbox }}
          path: test-results/
          retention-days: 90

      - name: Show Docker logs
        if: ${{ always() }}
        run: docker compose logs
        working-directory: ./tests/docker/
