---
name: CI

"on":
  push:
    branches:
      - "*"
  pull_request:
  schedule:
    - cron: 0 0 * * 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check netbox_kea/

      - name: Ruff format check
        run: uv run ruff format --check netbox_kea/

      - name: REUSE compliance
        run: uv run reuse lint

  test:
    strategy:
      matrix:
        include:
          - netbox: v4.0
          - netbox: v4.1
          - netbox: v4.2
          - netbox: v4.3
          - netbox: v4.4
          - netbox: v4.5

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python 3.12
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Ensure playwright browsers are installed
        run: uv run playwright install --with-deps

      - name: Run uv build
        run: uv build

      - name: Run test_setup.sh
        run: ./tests/test_setup.sh
        env:
          NETBOX_CONTAINER_TAG: ${{ matrix.netbox }}

      - name: Run pytest
        run: |
          uv run pytest --tracing=retain-on-failure -v --cov=netbox_kea --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.netbox == 'v4.5' && !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-traces-${{ matrix.netbox }}
          path: test-results/

      - name: Show Docker logs
        if: ${{ always() }}
        run: docker compose logs
        working-directory: ./tests/docker/
