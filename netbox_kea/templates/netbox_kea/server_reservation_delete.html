{% extends "generic/object.html" %}

{% block content %}
<div class="row">
  <div class="col col-md-6 offset-md-3">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <strong>Delete DHCPv{{ dhcp_version }} Reservation</strong>
      </div>
      <div class="card-body">
        <p>
          Are you sure you want to delete the DHCPv{{ dhcp_version }} reservation for
          <strong>{{ ip_address }}</strong> in subnet <strong>{{ subnet_id }}</strong>?
        </p>
        <p class="text-danger">
          <i class="mdi mdi-alert-circle-outline"></i>
          This action <strong>cannot be undone</strong>.
        </p>
        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="confirm" value="true">
          <div class="text-end mt-3">
            <a href="{{ return_url }}" class="btn btn-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-danger">
              <i class="mdi mdi-trash-can-outline" aria-hidden="true"></i> Delete
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
