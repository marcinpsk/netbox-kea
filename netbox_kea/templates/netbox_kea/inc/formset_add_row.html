<script>
(function () {
  const tbody = document.getElementById('formset-rows');
  const totalFormsInput = document.querySelector('[name$="TOTAL_FORMS"]');
  const addBtn = document.getElementById('add-row');

  if (!tbody || !totalFormsInput || !addBtn) { return; }

  const prefix = totalFormsInput.name.replace(/-TOTAL_FORMS$/, '');
  const escapedPrefix = prefix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const fieldRe = new RegExp(escapedPrefix + '-(\\d+)-', 'g');
  const idRe = new RegExp('id_' + escapedPrefix + '-(\\d+)-', 'g');

  addBtn.addEventListener('click', function () {
    const rows = tbody.querySelectorAll('tr.formset-row');
    const idx = rows.length;
    if (idx === 0) { return; }
    const lastRow = rows[idx - 1];
    const newRow = lastRow.cloneNode(true);
    // Clear stale validation state from the cloned row.
    newRow.querySelectorAll('.invalid-feedback').forEach(function (el) { el.textContent = ''; });
    newRow.querySelectorAll('.is-invalid').forEach(function (el) { el.classList.remove('is-invalid'); });
    newRow.querySelectorAll('.text-danger').forEach(function (el) { el.textContent = ''; el.classList.remove('text-danger'); });
    newRow.querySelectorAll('input, select, textarea').forEach(function (el) {
      el.name = el.name.replace(fieldRe, prefix + '-' + idx + '-');
      el.id = el.id ? el.id.replace(idRe, 'id_' + prefix + '-' + idx + '-') : '';
      if (el.type === 'checkbox') { el.checked = false; }
      else { el.value = ''; }
    });
    tbody.appendChild(newRow);
    totalFormsInput.value = idx + 1;
  });
})();
</script>
