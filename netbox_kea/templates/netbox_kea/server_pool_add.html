{% extends "generic/object.html" %}
{% load form_helpers %}

{% block content %}
<div class="row">
  <div class="col col-md-6 offset-md-3">
    <div class="card">
      <div class="card-header">
        <strong>Add Pool to DHCPv{{ dhcp_version }} Subnet {{ subnet_id }}</strong>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% render_form form %}
          <div class="text-end mt-3">
            <a href="{{ return_url }}" class="btn btn-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <i class="mdi mdi-plus-circle-outline" aria-hidden="true"></i> Add Pool
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
